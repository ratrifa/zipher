name: flutter_zipher
description: "Zipher - Secure encrypted file storage"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.0

  # Local Storage
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.3

  # Crypto
  pointycastle: ^3.7.3

  # File & Image
  file_picker: ^8.0.0
  image_picker: ^1.1.0
  path_provider: ^2.1.3
  open_file: ^3.5.0

  # PDF viewer
  pdfx: ^2.6.0

  # UI
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  bip39: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
